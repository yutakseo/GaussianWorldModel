# Configuration for Gaussian World Model predictor
# world_model:
_target_: gwm_predictor.GaussianPredictor

model_type: gwm
# Model architecture
model:
  # model_type: DiT_S_2 # One of the DiT model types
  input_size: ${dataset.image_size}
  in_channels: 3
  patch_size: 4
  hidden_size: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  class_dropout_prob: 0.0
  learn_sigma: false

# Gaussian Splat parameters
observation:
  use_gs: false
  point_cloud_size: 4096

# 3D VAE parameters
vae:
  use_vae: false
  num_latents: 16384
  latent_dim: 256
  vae_depth: 2  # renamed from num_res_blocks
  # use_kl: true
  use_kl: false
  commit_weight: 0.25
  # perceptual_weight: 0.1

# Reward model parameters
reward:
  use_reward_model: true
  reward_weight: 1.0

# Training parameters
# training:
symlog: true
# batch_size: 16  # slow 2x?
# batch_size: 8
batch_size: 4
selected_params: true
# segment_length: 12
# context_length: 2
# segment_length: 2
# context_length: 1
segment_length: ${dataset.segment_length}
context_length: ${dataset.context_length}
action_dim: ${dataset.action_dim}

# Diffusion parameters
diffusion:
  sigma_data: 0.5
  sigma_offset_noise: 0.1
  noise_previous_obs: false
  sigma_loc: -1.2
  sigma_scale: 1.2
  sigma_min: 2e-3
  sigma_max: 20.0
  num_steps_denoising: 5
  rho: 7
  order: 1

# Optimizer parameters
optimizer:
  # VAE/Tokenizer optimizer
  tok_lr: 1e-4
  tok_wd: 0.0
  tok_beta1: 0.9
  tok_beta2: 0.999
  
  # Model optimizer
  model_lr: 1e-4
  model_wd: 0.0
  embed_no_wd: false
  max_grad_norm: 10.0
  
  # Reward model optimizer
  reward_model_lr: 1e-4
  reward_model_wd: 0.0

# Sampling parameters for inference
sampling:
  s_churn: 0.0  # amount of stochasticity
  s_tmin: 0.0
  s_tmax: 5.0
  s_noise: 1.0
  s_cond: 0.005

# Optional paths for pretrained models
pretrained_model_path: null
