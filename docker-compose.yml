services:
  gaussianwm:
    build:
      context: .
      dockerfile: Dockerfile
    image: gaussianwm-dev:torch2.5.1-cuda12.1
    container_name: gaussianwm-dev
    working_dir: /workspace
    stdin_open: true
    tty: true
    shm_size: "32gb"
    gpus: all
    environment:
      GWM_PATH: /workspace
      PYTHON_BIN: /usr/local/bin/python3
      UV_PYTHON: /usr/local/bin/python3
      # "auto" compiles CUDA extensions for every GPU visible in the container.
      # Override with a semicolon-separated list such as "7.5;8.6" for portable images.
      TORCH_CUDA_ARCH_LIST: "${TORCH_CUDA_ARCH_LIST:-auto}"
      CUDA_HOME: /usr/local/cuda
      DROID_DATASET_DIR: /workspace/datasets/droid_100
      GWM_DOWNLOAD_SPLATT3R: "1"
      UV_LINK_MODE: copy
      UV_SYSTEM_PYTHON: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - .:/workspace
      - gaussianwm-uv-cache:/root/.cache/uv
      - gaussianwm-torch-cache:/root/.cache/torch
      - gaussianwm-setup-state:/var/cache/gaussianwm
    entrypoint: ["bash", "/workspace/scripts/container_entrypoint.sh"]
    command: sleep infinity

volumes:
  gaussianwm-uv-cache:
  gaussianwm-torch-cache:
  gaussianwm-setup-state:
